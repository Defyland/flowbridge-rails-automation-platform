name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flowbridge_test
          POSTGRES_USER: flowbridge
          POSTGRES_PASSWORD: flowbridge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowbridge -d flowbridge_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: flowbridge
      POSTGRES_PASSWORD: flowbridge
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Prepare database
        run: bin/rails db:prepare
      - name: Run test suite
        env:
          RAILS_ENV: test
        run: bin/rails test:all
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage

  lint:
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Lint and formatting check
        run: bin/rubocop -f github

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Brakeman static analysis
        run: bin/brakeman --no-pager
      - name: Bundler audit
        run: bin/bundler-audit

  openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Validate OpenAPI contract
        run: npx --yes @redocly/cli lint openapi.yaml

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker image
        run: docker build -t flowbridge:test .
