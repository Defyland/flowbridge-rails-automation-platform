name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flowbridge_test
          POSTGRES_USER: flowbridge
          POSTGRES_PASSWORD: flowbridge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowbridge -d flowbridge_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      RAILS_ENV: test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: flowbridge
      POSTGRES_PASSWORD: flowbridge
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Prepare database
        run: bin/rails db:prepare
      - name: Run test suite
        run: bin/rails test:all
      - name: Run system test smoke
        run: bin/rails test:system
      - name: Verify test seeds
        run: bin/rails db:seed:replant
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage

  lint:
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Lint and formatting check
        run: bin/rubocop -f github

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Brakeman static analysis
        run: bin/brakeman --quiet --no-pager --exit-on-warn --exit-on-error
      - name: Bundler audit
        run: bin/bundler-audit

  openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Validate OpenAPI contract
        run: npx --yes @redocly/cli lint openapi.yaml

  serverless-infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false
      - name: Test serverless ingress normalizer
        run: ruby -I services/serverless/webhook_ingress/lib services/serverless/webhook_ingress/test/flowbridge_serverless_ingress_test.rb
      - name: Validate serverless ingress IaC
        run: bin/infra-check

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker image
        run: docker build -t flowbridge:test .
