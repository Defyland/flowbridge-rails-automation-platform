service: flowbridge
image: flowbridge/automation-platform

servers:
  web:
    - 203.0.113.10

proxy:
  ssl: true
  host: flowbridge.example.com
  app_port: 3000

registry:
  username: flowbridge
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  clear:
    RAILS_LOG_LEVEL: info
    APP_HOST: flowbridge.example.com
    SOLID_QUEUE_IN_PUMA: true
  secret:
    - RAILS_MASTER_KEY
    - SECRET_KEY_BASE
    - DATABASE_URL
    - QUEUE_DATABASE_URL
    - CACHE_DATABASE_URL
    - CABLE_DATABASE_URL

volumes:
  - flowbridge_storage:/rails/storage

asset_path: /rails/public/assets

builder:
  arch: amd64
