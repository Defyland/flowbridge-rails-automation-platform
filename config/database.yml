default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("POSTGRES_HOST", "localhost") %>
  port: <%= ENV.fetch("POSTGRES_PORT", 5432) %>
  username: <%= ENV.fetch("POSTGRES_USER", ENV.fetch("USER", "flowbridge")) %>
  password: <%= ENV["POSTGRES_PASSWORD"] %>

development:
  primary:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB", "flowbridge_development") %>
  queue:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_QUEUE_DB", "flowbridge_development_queue") %>
    migrations_paths: db/queue_migrate
  cache:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_CACHE_DB", "flowbridge_development_cache") %>
    migrations_paths: db/cache_migrate
  cable:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_CABLE_DB", "flowbridge_development_cable") %>
    migrations_paths: db/cable_migrate

test:
  primary:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_TEST_DB", "flowbridge_test") %>
  queue:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_TEST_QUEUE_DB", "flowbridge_test_queue") %>
    migrations_paths: db/queue_migrate
  cache:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_TEST_CACHE_DB", "flowbridge_test_cache") %>
    migrations_paths: db/cache_migrate
  cable:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_TEST_CABLE_DB", "flowbridge_test_cable") %>
    migrations_paths: db/cable_migrate

production:
  primary:
    <<: *default
    url: <%= ENV.fetch("DATABASE_URL", "postgresql://flowbridge:flowbridge@localhost:5432/flowbridge_production") %>
  queue:
    <<: *default
    url: <%= ENV.fetch("QUEUE_DATABASE_URL") { ENV.fetch("DATABASE_URL", "postgresql://flowbridge:flowbridge@localhost:5432/flowbridge_production_queue") } %>
    migrations_paths: db/queue_migrate
  cache:
    <<: *default
    url: <%= ENV.fetch("CACHE_DATABASE_URL") { ENV.fetch("DATABASE_URL", "postgresql://flowbridge:flowbridge@localhost:5432/flowbridge_production_cache") } %>
    migrations_paths: db/cache_migrate
  cable:
    <<: *default
    url: <%= ENV.fetch("CABLE_DATABASE_URL") { ENV.fetch("DATABASE_URL", "postgresql://flowbridge:flowbridge@localhost:5432/flowbridge_production_cable") } %>
    migrations_paths: db/cable_migrate
