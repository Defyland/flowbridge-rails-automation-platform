services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flowbridge_development
      POSTGRES_USER: flowbridge
      POSTGRES_PASSWORD: flowbridge
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowbridge -d flowbridge_development"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: local-compose-secret-key-base
      DATABASE_URL: postgres://flowbridge:flowbridge@postgres:5432/flowbridge_development
      QUEUE_DATABASE_URL: postgres://flowbridge:flowbridge@postgres:5432/flowbridge_development_queue
      CACHE_DATABASE_URL: postgres://flowbridge:flowbridge@postgres:5432/flowbridge_development_cache
      CABLE_DATABASE_URL: postgres://flowbridge:flowbridge@postgres:5432/flowbridge_development_cable
      RAILS_LOG_TO_STDOUT: "true"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    command: ["./bin/rails", "server", "-b", "0.0.0.0"]
